<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stone CSV → OFX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f7;--card:#fff;--border:#e8e4df;--text:#2d2a26;--muted:#8a857e;--accent:#2D8659;--accent-light:#e8f5ee;--red:#c0392b;--red-light:#fdecea}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.container{width:100%;max-width:520px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px 24px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:24px}
label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text)}
.pin-input{display:flex;gap:8px;justify-content:center;margin:20px 0}
.pin-input input{width:48px;height:56px;text-align:center;font-size:24px;font-weight:700;border:2px solid var(--border);border-radius:10px;outline:none;transition:border .2s}
.pin-input input:focus{border-color:var(--accent)}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#246e4a}
.btn-primary:disabled{background:#b0c9b8;cursor:not-allowed}
.btn-download{background:var(--accent-light);color:var(--accent);margin-top:12px}
.btn-download:hover{background:#d4edde}
.dropzone{border:2px dashed var(--border);border-radius:10px;padding:32px 16px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px}
.dropzone.active{border-color:var(--accent);background:var(--accent-light)}
.dropzone p{color:var(--muted);font-size:14px}
.dropzone .icon{font-size:32px;margin-bottom:8px;display:block}
.file-input{display:none}
.preview{margin:16px 0;overflow-x:auto}
.preview table{width:100%;border-collapse:collapse;font-size:12px}
.preview th{background:#f5f3f0;text-align:left;padding:8px 10px;font-weight:600;border-bottom:2px solid var(--border);white-space:nowrap}
.preview td{padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.stat{background:var(--bg);border-radius:8px;padding:12px;text-align:center}
.stat .val{font-size:18px;font-weight:700}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.stat.credit .val{color:var(--accent)}
.stat.debit .val{color:var(--red)}
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin:12px 0}
.alert-success{background:var(--accent-light);color:#1a5c3a;border-left:3px solid var(--accent)}
.alert-error{background:var(--red-light);color:var(--red);border-left:3px solid var(--red)}
.steps{list-style:none;font-size:12px;color:var(--muted);margin:16px 0;padding-left:0}
.steps li{padding:4px 0;padding-left:20px;position:relative}
.steps li::before{content:"";position:absolute;left:0;top:10px;width:8px;height:8px;border-radius:50%;background:var(--border)}
.steps li.done::before{background:var(--accent)}
.mapping{font-size:12px;color:var(--muted);background:var(--bg);border-radius:8px;padding:10px 14px;margin:12px 0}
.mapping strong{color:var(--text)}
.hidden{display:none}
.back-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:16px;padding:0}
.back-btn:hover{color:var(--text)}
</style>
</head>
<body>

<div class="container">
  <!-- PIN Screen -->
  <div id="pinScreen" class="card">
    <h1>Stone → OFX</h1>
    <p class="subtitle">Conversor de extrato Stone para OFX</p>
    <label style="text-align:center">Digite o PIN de acesso</label>
    <div class="pin-input">
      <input type="tel" maxlength="1" inputmode="numeric" data-pin="0" autofocus>
      <input type="tel" maxlength="1" inputmode="numeric" data-pin="1">
      <input type="tel" maxlength="1" inputmode="numeric" data-pin="2">
      <input type="tel" maxlength="1" inputmode="numeric" data-pin="3">
    </div>
    <div id="pinError" class="alert alert-error hidden">PIN incorreto</div>
  </div>

  <!-- Converter Screen -->
  <div id="converterScreen" class="card hidden">
    <h1>Stone → OFX</h1>
    <p class="subtitle">Envie o CSV exportado do Portal Stone</p>

    <ol class="steps">
      <li id="step1">Selecione o arquivo CSV</li>
      <li id="step2">Verifique a prévia</li>
      <li id="step3">Baixe o OFX</li>
    </ol>

    <div id="uploadArea">
      <div class="dropzone" id="dropzone">
        <span class="icon">📄</span>
        <p>Arraste o CSV aqui<br>ou toque para selecionar</p>
      </div>
      <input type="file" accept=".csv,.txt" class="file-input" id="fileInput">
    </div>

    <div id="resultArea" class="hidden">
      <button class="back-btn" id="resetBtn">← Novo arquivo</button>

      <div id="mappingInfo" class="mapping"></div>

      <div class="preview" id="previewArea"></div>

      <div class="stats" id="statsArea"></div>

      <div id="alerts"></div>

      <button class="btn btn-download" id="downloadBtn" style="display:none">
        Baixar arquivo OFX
      </button>
    </div>
  </div>
</div>

<script>
// ============================================================
// PIN
// ============================================================
const CORRECT_PIN = '1234';
const pinInputs = document.querySelectorAll('.pin-input input');
const pinError = document.getElementById('pinError');

pinInputs.forEach((inp, i) => {
  inp.addEventListener('input', () => {
    if (inp.value.length === 1 && i < pinInputs.length - 1) {
      pinInputs[i + 1].focus();
    }
    checkPin();
  });
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !inp.value && i > 0) {
      pinInputs[i - 1].focus();
    }
  });
});

function checkPin() {
  const pin = Array.from(pinInputs).map(i => i.value).join('');
  if (pin.length === 4) {
    if (pin === CORRECT_PIN) {
      document.getElementById('pinScreen').classList.add('hidden');
      document.getElementById('converterScreen').classList.remove('hidden');
    } else {
      pinError.classList.remove('hidden');
      pinInputs.forEach(i => { i.value = ''; });
      pinInputs[0].focus();
      setTimeout(() => pinError.classList.add('hidden'), 2000);
    }
  }
}

// ============================================================
// File Upload
// ============================================================
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('active'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('active'));
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('active');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleFile(fileInput.files[0]);
});

document.getElementById('resetBtn').addEventListener('click', resetConverter);

function resetConverter() {
  document.getElementById('uploadArea').classList.remove('hidden');
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('downloadBtn').style.display = 'none';
  document.getElementById('step1').classList.remove('done');
  document.getElementById('step2').classList.remove('done');
  document.getElementById('step3').classList.remove('done');
  fileInput.value = '';
}

// ============================================================
// CSV Parsing
// ============================================================

function readFileAsArrayBuffer(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function decodeCSV(buffer) {
  const encodings = ['utf-8', 'iso-8859-1'];
  for (const enc of encodings) {
    try {
      const text = new TextDecoder(enc, { fatal: true }).decode(buffer);
      if (text.length > 0) return text;
    } catch (e) { /* try next */ }
  }
  return new TextDecoder('iso-8859-1').decode(buffer);
}

function detectSeparator(text) {
  const firstLine = text.split('\n')[0];
  const counts = { ';': 0, ',': 0, '\t': 0 };
  for (const ch of firstLine) {
    if (ch in counts) counts[ch]++;
  }
  let best = ';', max = 0;
  for (const [sep, c] of Object.entries(counts)) {
    if (c > max) { max = c; best = sep; }
  }
  return best;
}

function parseCSV(text) {
  const sep = detectSeparator(text);
  const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l);
  if (lines.length < 2) return null;

  const headers = lines[0].split(sep).map(h => h.replace(/^"|"$/g, '').trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = lines[i].split(sep).map(v => v.replace(/^"|"$/g, '').trim());
    if (vals.length >= 2) {
      const row = {};
      headers.forEach((h, j) => { row[h] = vals[j] || ''; });
      rows.push(row);
    }
  }
  return { headers, rows };
}

// ============================================================
// Column Detection (ported from Python)
// ============================================================

function detectColumns(headers) {
  const lower = {};
  headers.forEach(h => { lower[h.toLowerCase().trim()] = h; });
  const mapping = {};

  const dateCandidates = [
    'data', 'data da transação', 'data transação', 'data da venda',
    'data de pagamento', 'data pagamento', 'date', 'data_transacao',
    'data da captura', 'data captura',
  ];
  for (const c of dateCandidates) {
    if (lower[c]) { mapping.date = lower[c]; break; }
  }

  const amountCandidates = [
    'valor', 'valor bruto', 'valor líquido', 'valor da transação',
    'valor_bruto', 'valor_liquido', 'amount', 'valor transação',
    'valor da venda', 'valor total',
  ];
  for (const c of amountCandidates) {
    if (lower[c]) { mapping.amount = lower[c]; break; }
  }

  const descCandidates = [
    'descrição', 'descricao', 'description', 'tipo', 'tipo de transação',
    'tipo transação', 'bandeira', 'forma de pagamento', 'produto',
    'tipo de pagamento', 'status',
  ];
  for (const c of descCandidates) {
    if (lower[c]) { mapping.description = lower[c]; break; }
  }

  const txnIdCandidates = [
    'nsu', 'id', 'id da transação', 'código', 'codigo',
    'stone id', 'transaction_id', 'authorization_code',
    'código de autorização', 'numero do comprovante',
  ];
  for (const c of txnIdCandidates) {
    if (lower[c]) { mapping.txnId = lower[c]; break; }
  }

  return mapping;
}

// ============================================================
// Number & Date Parsing (Brazilian format)
// ============================================================

function parseBrazilianNumber(val) {
  if (!val || val.trim() === '') return 0;
  let s = val.trim().replace(/[R$\s]/g, '');
  let negative = false;
  if (s.startsWith('(') && s.endsWith(')')) { negative = true; s = s.slice(1, -1); }
  if (s.startsWith('-')) { negative = true; s = s.slice(1); }
  if (s.includes('.') && s.includes(',')) {
    s = s.replace(/\./g, '').replace(',', '.');
  } else if (s.includes(',')) {
    s = s.replace(',', '.');
  }
  const num = parseFloat(s);
  if (isNaN(num)) return 0;
  return negative ? -num : num;
}

function parseDate(val) {
  if (!val || val.trim() === '') return new Date();
  const s = val.trim();

  // dd/mm/yyyy or dd/mm/yyyy HH:MM:SS
  let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+\d{2}:\d{2}:\d{2})?$/);
  if (m) return new Date(parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]));

  // dd/mm/yy
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
  if (m) return new Date(2000 + parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]));

  // yyyy-mm-dd
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));

  // dd-mm-yyyy
  m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})/);
  if (m) return new Date(parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]));

  return new Date();
}

// ============================================================
// FITID Generation (SHA-256 via Web Crypto, fallback to simple hash)
// ============================================================

function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const ch = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + ch;
    hash |= 0;
  }
  return Math.abs(hash).toString(16).toUpperCase().padStart(16, '0').slice(0, 16);
}

function generateFitId(data, index) {
  return simpleHash(data + '_' + index);
}

// ============================================================
// Transaction Parsing
// ============================================================

function parseTransactions(rows, mapping) {
  const transactions = [];
  let errors = 0;

  rows.forEach((row, idx) => {
    try {
      const dt = parseDate(row[mapping.date]);
      const amount = parseBrazilianNumber(row[mapping.amount]);
      if (amount === 0) return;

      const memoParts = [];
      if (mapping.description && row[mapping.description]) {
        memoParts.push(row[mapping.description].trim());
      }
      if (mapping.txnId && row[mapping.txnId]) {
        memoParts.push('NSU:' + row[mapping.txnId].trim());
      }
      const memo = memoParts.length ? memoParts.join(' | ') : 'Stone';
      const fitid = generateFitId(dt.toISOString() + amount + memo, idx);

      transactions.push({ date: dt, amount, memo, fitid });
    } catch (e) {
      errors++;
    }
  });

  return { transactions, errors };
}

// ============================================================
// OFX Builder
// ============================================================

function pad2(n) { return n.toString().padStart(2, '0'); }

function fmtOFXDate(d) {
  return d.getFullYear().toString() +
    pad2(d.getMonth() + 1) + pad2(d.getDate()) +
    pad2(d.getHours()) + pad2(d.getMinutes()) + pad2(d.getSeconds());
}

function buildOFX(transactions, accountId) {
  accountId = accountId || 'STONE_CMP';
  if (!transactions.length) return '';

  const dates = transactions.map(t => t.date);
  const dtStart = fmtOFXDate(new Date(Math.min(...dates)));
  const dtEnd = fmtOFXDate(new Date(Math.max(...dates)));
  const now = fmtOFXDate(new Date());

  const lines = [
    'OFXHEADER:100', 'DATA:OFXSGML', 'VERSION:102', 'SECURITY:NONE',
    'ENCODING:USASCII', 'CHARSET:1252', 'COMPRESSION:NONE',
    'OLDFILEUID:NONE', 'NEWFILEUID:NONE', '',
    '<OFX>', '<SIGNONMSGSRSV1>', '<SONRS>', '<STATUS>',
    '<CODE>0', '<SEVERITY>INFO', '</STATUS>',
    '<DTSERVER>' + now, '<LANGUAGE>POR',
    '</SONRS>', '</SIGNONMSGSRSV1>',
    '<BANKMSGSRSV1>', '<STMTTRNRS>', '<TRNUID>1',
    '<STATUS>', '<CODE>0', '<SEVERITY>INFO', '</STATUS>',
    '<STMTRS>', '<CURDEF>BRL', '<BANKACCTFROM>',
    '<BANKID>STONE', '<ACCTID>' + accountId,
    '<ACCTTYPE>CHECKING', '</BANKACCTFROM>',
    '<BANKTRANLIST>', '<DTSTART>' + dtStart, '<DTEND>' + dtEnd,
  ];

  transactions.forEach(txn => {
    const dtStr = fmtOFXDate(txn.date);
    const trntype = txn.amount >= 0 ? 'CREDIT' : 'DEBIT';
    const memo = (txn.memo || 'Stone').slice(0, 255);
    lines.push(
      '<STMTTRN>', '<TRNTYPE>' + trntype,
      '<DTPOSTED>' + dtStr, '<TRNAMT>' + txn.amount.toFixed(2),
      '<FITID>' + txn.fitid, '<MEMO>' + memo,
      '</STMTTRN>'
    );
  });

  const total = transactions.reduce((s, t) => s + t.amount, 0);
  lines.push(
    '</BANKTRANLIST>', '<LEDGERBAL>',
    '<BALAMT>' + total.toFixed(2), '<DTASOF>' + dtEnd,
    '</LEDGERBAL>', '</STMTRS>', '</STMTTRNRS>',
    '</BANKMSGSRSV1>', '</OFX>'
  );

  return lines.join('\n');
}

// ============================================================
// Main Flow
// ============================================================

let currentOFX = '';
let currentFilename = '';

async function handleFile(file) {
  if (!file.name.toLowerCase().endsWith('.csv') && !file.name.toLowerCase().endsWith('.txt')) {
    showAlert('Selecione um arquivo .csv', 'error');
    return;
  }

  document.getElementById('step1').classList.add('done');

  const buffer = await readFileAsArrayBuffer(file);
  const text = decodeCSV(buffer);
  const data = parseCSV(text);

  if (!data || data.rows.length === 0) {
    showAlert('Nao foi possivel ler o arquivo CSV. Verifique o formato.', 'error');
    return;
  }

  const mapping = detectColumns(data.headers);

  if (!mapping.date || !mapping.amount) {
    showAlert('Nao encontrei colunas de Data e Valor. Verifique se e um CSV da Stone.', 'error');
    return;
  }

  // Show mapping
  const mappingEl = document.getElementById('mappingInfo');
  let mapText = 'Colunas detectadas: <strong>' + mapping.date + '</strong> (data)';
  mapText += ' | <strong>' + mapping.amount + '</strong> (valor)';
  if (mapping.description) mapText += ' | <strong>' + mapping.description + '</strong> (desc)';
  mappingEl.innerHTML = mapText;

  // Preview table
  const previewEl = document.getElementById('previewArea');
  const showRows = data.rows.slice(0, 8);
  const showCols = [mapping.date, mapping.amount];
  if (mapping.description) showCols.push(mapping.description);
  if (mapping.txnId) showCols.push(mapping.txnId);

  let html = '<table><thead><tr>';
  showCols.forEach(c => { html += '<th>' + c + '</th>'; });
  html += '</tr></thead><tbody>';
  showRows.forEach(row => {
    html += '<tr>';
    showCols.forEach(c => { html += '<td>' + (row[c] || '') + '</td>'; });
    html += '</tr>';
  });
  if (data.rows.length > 8) {
    html += '<tr><td colspan="' + showCols.length + '" style="text-align:center;color:var(--muted);font-style:italic">... e mais ' + (data.rows.length - 8) + ' linhas</td></tr>';
  }
  html += '</tbody></table>';
  previewEl.innerHTML = html;

  // Parse transactions
  const { transactions, errors } = parseTransactions(data.rows, mapping);

  if (!transactions.length) {
    showAlert('Nenhuma transacao valida encontrada.', 'error');
    return;
  }

  document.getElementById('step2').classList.add('done');

  // Stats
  const totalCredit = transactions.filter(t => t.amount > 0).reduce((s, t) => s + t.amount, 0);
  const totalDebit = transactions.filter(t => t.amount < 0).reduce((s, t) => s + t.amount, 0);

  const statsEl = document.getElementById('statsArea');
  statsEl.innerHTML = `
    <div class="stat"><div class="val">${transactions.length}</div><div class="lbl">Transacoes</div></div>
    <div class="stat credit"><div class="val">R$ ${totalCredit.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div><div class="lbl">Creditos</div></div>
    <div class="stat debit"><div class="val">R$ ${totalDebit.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div><div class="lbl">Debitos</div></div>
    <div class="stat"><div class="val">R$ ${(totalCredit + totalDebit).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div><div class="lbl">Saldo</div></div>
  `;

  // Build OFX
  currentOFX = buildOFX(transactions, 'STONE_CMP');

  const txDates = transactions.map(t => t.date);
  const minD = new Date(Math.min(...txDates));
  const maxD = new Date(Math.max(...txDates));
  currentFilename = 'stone_' +
    minD.getFullYear() + pad2(minD.getMonth()+1) + pad2(minD.getDate()) + '_' +
    maxD.getFullYear() + pad2(maxD.getMonth()+1) + pad2(maxD.getDate()) + '.ofx';

  let alertMsg = 'Conversao concluida! ' + transactions.length + ' transacoes.';
  if (errors > 0) alertMsg += ' (' + errors + ' linhas ignoradas)';
  showAlert(alertMsg, 'success');

  document.getElementById('step3').classList.add('done');

  // Show result
  document.getElementById('uploadArea').classList.add('hidden');
  document.getElementById('resultArea').classList.remove('hidden');
  document.getElementById('downloadBtn').style.display = 'block';
}

document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!currentOFX) return;
  const blob = new Blob([currentOFX], { type: 'application/x-ofx' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = currentFilename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

function showAlert(msg, type) {
  const el = document.getElementById('alerts');
  el.innerHTML = '<div class="alert alert-' + type + '">' + msg + '</div>';
}
</script>
</body>
</html>
