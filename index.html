<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Stone OFX">
<title>Conversor Stone</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#f5f0eb;
  color:#3d3830;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:24px 16px;
}

/* Header clínica */
.logo{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#2D8659,#3ba370);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(45,134,89,.25);
}
.logo svg{width:28px;height:28px}
.clinic-name{font-size:13px;color:#9a9389;margin-bottom:24px;text-align:center}

/* Card principal */
.card{
  background:#fff;
  border-radius:16px;
  padding:32px 24px;
  width:100%;max-width:400px;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  text-align:center;
}
.title{font-size:20px;font-weight:700;margin-bottom:6px;color:#2d2a26}
.desc{font-size:14px;color:#9a9389;margin-bottom:28px;line-height:1.5}

/* Botão de selecionar arquivo */
.upload-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:18px 20px;
  background:#f5f0eb;
  border:2px dashed #d4cdc4;
  border-radius:14px;
  font-size:16px;font-weight:600;color:#6b6459;
  cursor:pointer;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.upload-btn:active{background:#ebe5dd;border-color:#b0a898}
.upload-btn svg{flex-shrink:0}
.file-input{display:none}

/* Arquivo selecionado */
.file-name{
  font-size:13px;color:#9a9389;
  margin-top:12px;
  word-break:break-all;
}

/* Resultado */
.result{margin-top:24px;display:none}
.result.show{display:block}

.success-icon{
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,#2D8659,#3ba370);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
}
.success-icon svg{width:32px;height:32px}

.success-text{font-size:16px;font-weight:600;color:#2D8659;margin-bottom:4px}
.success-detail{font-size:13px;color:#9a9389;margin-bottom:20px}

.download-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:18px;
  background:linear-gradient(135deg,#2D8659,#3ba370);
  border:none;border-radius:14px;
  font-size:17px;font-weight:700;color:#fff;
  cursor:pointer;
  box-shadow:0 4px 12px rgba(45,134,89,.3);
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.download-btn:active{transform:scale(.97);box-shadow:0 2px 6px rgba(45,134,89,.3)}
.download-btn svg{flex-shrink:0}

/* Novo arquivo */
.reset-btn{
  display:inline-block;
  margin-top:16px;
  background:none;border:none;
  font-size:14px;color:#9a9389;
  cursor:pointer;text-decoration:underline;
  -webkit-tap-highlight-color:transparent;
}

/* Erro */
.error{
  margin-top:16px;
  padding:14px 18px;
  background:#fdf0ef;
  border-radius:12px;
  font-size:14px;color:#c0392b;
  display:none;
}
.error.show{display:block}

/* PIN */
.pin-screen{text-align:center}
.pin-label{font-size:15px;color:#6b6459;margin-bottom:16px}
.pin-row{display:flex;gap:10px;justify-content:center;margin-bottom:12px}
.pin-row input{
  width:52px;height:60px;
  text-align:center;
  font-size:26px;font-weight:700;color:#3d3830;
  border:2px solid #d4cdc4;border-radius:12px;
  background:#faf8f5;
  outline:none;transition:border .2s;
  -webkit-appearance:none;
}
.pin-row input:focus{border-color:#2D8659;background:#fff}
.pin-error{font-size:13px;color:#c0392b;height:20px}

.hidden{display:none}
</style>
</head>
<body>

<!-- Logo e nome -->
<div class="logo">
  <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
</div>
<div class="clinic-name">Dra. Michelle Pontes</div>

<!-- Tela PIN -->
<div class="card" id="pinScreen">
  <div class="title">Extrato Stone</div>
  <div class="desc">Digite a senha para acessar</div>
  <div class="pin-row">
    <input type="tel" maxlength="1" inputmode="numeric" data-p="0" autofocus>
    <input type="tel" maxlength="1" inputmode="numeric" data-p="1">
    <input type="tel" maxlength="1" inputmode="numeric" data-p="2">
    <input type="tel" maxlength="1" inputmode="numeric" data-p="3">
  </div>
  <div class="pin-error" id="pinError"></div>
</div>

<!-- Tela principal -->
<div class="card hidden" id="mainScreen">
  <div class="title">Extrato Stone</div>
  <div class="desc">Selecione o arquivo da Stone para converter</div>

  <div id="uploadArea">
    <div class="upload-btn" id="uploadBtn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Selecionar arquivo
    </div>
    <input type="file" accept=".csv,.txt" class="file-input" id="fileInput">
    <div class="file-name" id="fileName"></div>
  </div>

  <div class="error" id="errorMsg"></div>

  <div class="result" id="resultArea">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-text">Arquivo pronto!</div>
    <div class="success-detail" id="resultDetail"></div>

    <button class="download-btn" id="downloadBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Baixar arquivo convertido
    </button>

    <button class="reset-btn" id="resetBtn">Converter outro arquivo</button>
  </div>
</div>

<script>
// PIN
var PIN = '1234';
var pins = document.querySelectorAll('.pin-row input');

pins.forEach(function(inp, i) {
  inp.addEventListener('input', function() {
    if (inp.value.length === 1 && i < pins.length - 1) pins[i + 1].focus();
    var code = '';
    pins.forEach(function(p) { code += p.value; });
    if (code.length === 4) {
      if (code === PIN) {
        document.getElementById('pinScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
      } else {
        document.getElementById('pinError').textContent = 'Senha incorreta';
        pins.forEach(function(p) { p.value = ''; });
        pins[0].focus();
        setTimeout(function() { document.getElementById('pinError').textContent = ''; }, 2000);
      }
    }
  });
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !inp.value && i > 0) pins[i - 1].focus();
  });
});

// Upload
document.getElementById('uploadBtn').addEventListener('click', function() {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', function() {
  if (this.files.length) processFile(this.files[0]);
});

document.getElementById('resetBtn').addEventListener('click', function() {
  document.getElementById('resultArea').classList.remove('show');
  document.getElementById('uploadArea').style.display = '';
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('fileName').textContent = '';
  document.getElementById('fileInput').value = '';
});

// Download
var savedOFX = '';
var savedName = '';

document.getElementById('downloadBtn').addEventListener('click', function() {
  if (!savedOFX) return;
  var blob = new Blob([savedOFX], { type: 'application/x-ofx' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = savedName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// ---- Processamento ----

function processFile(file) {
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('fileName').textContent = file.name;

  var reader = new FileReader();
  reader.onload = function() {
    try {
      var text = decode(reader.result);
      var data = parseCSV(text);
      if (!data || data.rows.length === 0) return showError('Nao consegui ler o arquivo. Verifique se e o arquivo correto da Stone.');

      var map = detectCols(data.headers);
      if (!map.date || !map.amount) return showError('Arquivo nao reconhecido. Verifique se e o extrato correto da Stone.');

      var result = convert(data.rows, map);
      if (!result.transactions.length) return showError('Nenhuma transacao encontrada no arquivo.');

      savedOFX = buildOFX(result.transactions);

      var dates = result.transactions.map(function(t) { return t.date; });
      var d1 = new Date(Math.min.apply(null, dates));
      var d2 = new Date(Math.max.apply(null, dates));
      savedName = 'stone_' + fmtDate(d1) + '_' + fmtDate(d2) + '.ofx';

      document.getElementById('resultDetail').textContent =
        result.transactions.length + ' transacoes encontradas';
      document.getElementById('uploadArea').style.display = 'none';
      document.getElementById('resultArea').classList.add('show');

    } catch (e) {
      showError('Erro ao processar o arquivo. Tente novamente.');
    }
  };
  reader.readAsArrayBuffer(file);
}

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

// ---- Helpers ----

function decode(buf) {
  try { return new TextDecoder('utf-8', { fatal: true }).decode(buf); }
  catch (e) { return new TextDecoder('iso-8859-1').decode(buf); }
}

function parseCSV(text) {
  var line1 = text.split('\n')[0];
  var sep = ';';
  if ((line1.split(',').length) > (line1.split(';').length)) sep = ',';
  if ((line1.split('\t').length) > (line1.split(sep).length)) sep = '\t';

  var lines = text.trim().split('\n');
  if (lines.length < 2) return null;

  var headers = lines[0].split(sep).map(function(h) { return h.replace(/^"|"$/g, '').trim(); });
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var vals = lines[i].split(sep).map(function(v) { return v.replace(/^"|"$/g, '').trim(); });
    if (vals.length >= 2) {
      var row = {};
      headers.forEach(function(h, j) { row[h] = vals[j] || ''; });
      rows.push(row);
    }
  }
  return { headers: headers, rows: rows };
}

function detectCols(headers) {
  var low = {};
  headers.forEach(function(h) { low[h.toLowerCase().trim()] = h; });
  var m = {};

  ['data','data da transacao','data transacao','data da venda','data de pagamento','data pagamento','date','data_transacao','data da captura','data captura','data da transação','data transação'].forEach(function(c) {
    if (!m.date && low[c]) m.date = low[c];
  });
  ['valor','valor bruto','valor liquido','valor da transacao','valor_bruto','valor_liquido','amount','valor transacao','valor da venda','valor total','valor líquido','valor da transação','valor transação'].forEach(function(c) {
    if (!m.amount && low[c]) m.amount = low[c];
  });
  ['descricao','descrição','description','tipo','tipo de transacao','tipo transacao','bandeira','forma de pagamento','produto','tipo de pagamento','status','tipo de transação','tipo transação'].forEach(function(c) {
    if (!m.desc && low[c]) m.desc = low[c];
  });
  ['nsu','id','id da transacao','codigo','código','stone id','transaction_id','authorization_code','id da transação','código de autorização','codigo de autorizacao','numero do comprovante'].forEach(function(c) {
    if (!m.txn && low[c]) m.txn = low[c];
  });

  return m;
}

function parseNum(val) {
  if (!val) return 0;
  var s = val.trim().replace(/[R$\s]/g, '');
  var neg = false;
  if (s.charAt(0) === '(' && s.charAt(s.length - 1) === ')') { neg = true; s = s.slice(1, -1); }
  if (s.charAt(0) === '-') { neg = true; s = s.slice(1); }
  if (s.indexOf('.') !== -1 && s.indexOf(',') !== -1) s = s.replace(/\./g, '').replace(',', '.');
  else if (s.indexOf(',') !== -1) s = s.replace(',', '.');
  var n = parseFloat(s);
  if (isNaN(n)) return 0;
  return neg ? -n : n;
}

function parseDt(val) {
  if (!val) return new Date();
  var s = val.trim();
  var m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if (m) {
    var y = parseInt(m[3]); if (y < 100) y += 2000;
    return new Date(y, parseInt(m[2]) - 1, parseInt(m[1]));
  }
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
  return new Date();
}

function hashStr(s) {
  var h = 0;
  for (var i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
  return Math.abs(h).toString(16).toUpperCase().padStart(16, '0').slice(0, 16);
}

function convert(rows, map) {
  var txns = [], errs = 0;
  rows.forEach(function(row, idx) {
    try {
      var dt = parseDt(row[map.date]);
      var amt = parseNum(row[map.amount]);
      if (amt === 0) return;
      var parts = [];
      if (map.desc && row[map.desc]) parts.push(row[map.desc].trim());
      if (map.txn && row[map.txn]) parts.push('NSU:' + row[map.txn].trim());
      var memo = parts.length ? parts.join(' | ') : 'Stone';
      txns.push({ date: dt, amount: amt, memo: memo, fitid: hashStr(dt.toISOString() + amt + memo + '_' + idx) });
    } catch (e) { errs++; }
  });
  return { transactions: txns, errors: errs };
}

function p2(n) { return n < 10 ? '0' + n : '' + n; }
function fmtDate(d) { return d.getFullYear() + p2(d.getMonth() + 1) + p2(d.getDate()); }
function ofxDt(d) { return fmtDate(d) + p2(d.getHours()) + p2(d.getMinutes()) + p2(d.getSeconds()); }

function buildOFX(txns) {
  var dates = txns.map(function(t) { return t.date; });
  var d1 = ofxDt(new Date(Math.min.apply(null, dates)));
  var d2 = ofxDt(new Date(Math.max.apply(null, dates)));
  var now = ofxDt(new Date());

  var L = [
    'OFXHEADER:100','DATA:OFXSGML','VERSION:102','SECURITY:NONE',
    'ENCODING:USASCII','CHARSET:1252','COMPRESSION:NONE',
    'OLDFILEUID:NONE','NEWFILEUID:NONE','',
    '<OFX>','<SIGNONMSGSRSV1>','<SONRS>','<STATUS>',
    '<CODE>0','<SEVERITY>INFO','</STATUS>',
    '<DTSERVER>' + now,'<LANGUAGE>POR',
    '</SONRS>','</SIGNONMSGSRSV1>',
    '<BANKMSGSRSV1>','<STMTTRNRS>','<TRNUID>1',
    '<STATUS>','<CODE>0','<SEVERITY>INFO','</STATUS>',
    '<STMTRS>','<CURDEF>BRL','<BANKACCTFROM>',
    '<BANKID>STONE','<ACCTID>STONE_CMP',
    '<ACCTTYPE>CHECKING','</BANKACCTFROM>',
    '<BANKTRANLIST>','<DTSTART>' + d1,'<DTEND>' + d2
  ];

  txns.forEach(function(t) {
    L.push('<STMTTRN>','<TRNTYPE>' + (t.amount >= 0 ? 'CREDIT' : 'DEBIT'),
      '<DTPOSTED>' + ofxDt(t.date),'<TRNAMT>' + t.amount.toFixed(2),
      '<FITID>' + t.fitid,'<MEMO>' + t.memo.slice(0, 255),'</STMTTRN>');
  });

  var bal = 0; txns.forEach(function(t) { bal += t.amount; });
  L.push('</BANKTRANLIST>','<LEDGERBAL>','<BALAMT>' + bal.toFixed(2),
    '<DTASOF>' + d2,'</LEDGERBAL>','</STMTRS>','</STMTTRNRS>',
    '</BANKMSGSRSV1>','</OFX>');

  return L.join('\n');
}
</script>
</body>
</html>
